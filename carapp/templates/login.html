<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Sansita+Swashed:wght@600&display=swap");
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(45deg, rgb(107, 30, 30), black);
            font-family: "Crimson Text", cursive;
        }
        .center {
            position: relative;
            padding: 60px 80px;  /* Increased padding */
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            width: 400px;  /* Increased form width */
            height: 480px; /* Increased form height */
        }
        .center h1 {
            font-size: 2.5em;
            border-left: 5px solid rgb(107, 30, 30);
            padding: 10px;
            color: #000;
            letter-spacing: 5px;
            margin-bottom: 40px;
            font-weight: bold;
            padding-left: 10px;
            text-transform: uppercase;
            text-align: center;
        }
        .center .inputbox {
            position: relative;
            width: 100%;
            height: 50px;
            margin-bottom: 25px;  /* Reduced margin between fields */
        }
        .center .inputbox input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            border: 2px solid #000;
            outline: none;
            background: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 1.2em;
            transition: 0.3s ease-in-out;
        }
        .center .inputbox:last-child {
            margin-bottom: 0;
        }
        .center .inputbox span {
            position: absolute;
            top: 14px;
            left: 20px;
            font-size: 1em;
            transition: 0.6s;
            font-family: sans-serif;
        }
        .center .inputbox input:focus ~ span,
        .center .inputbox input:valid ~ span {
            transform: translateX(-13px) translateY(-35px);
            font-size: 1em;
        }
        .center .inputbox[type="password"] {
            padding-right: 35px; /* Space for eye icon */
        }
        .center .inputbox .eye-icon {
            position: absolute;
            right: 10px;
            top: 10px;
            font-size: 1.5em;
            cursor: pointer;
            color: #000;
        }
        .center .inputbox input[type="submit"] {
            width: 100%;
            padding: 12px;
            background: rgb(107, 30, 30);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1.3em; /* Slightly larger font size */
            cursor: pointer;
        }
        .center .inputbox input[type="submit"]:hover {
            background: linear-gradient(45deg, rgb(107, 30, 30), black);
        }
        .center p {
            color: red;
            font-size: 1.2em;
            margin-bottom: 20px;
            text-align: center;
        }
        .text-center a {
            font-size: 1rem;
            color: #457b9d;
            text-decoration: none;
            transition: color 0.2s;
        }

        .text-center a:hover {
            color: #1d3557;
        }
    </style>
</head>
<body>
    <div class="center">
        <h1>LOGIN</h1>
        {% if error %}
        <p>{{ error }}</p>
        {% endif %}
        <form action="/login/" method="POST">
            {% csrf_token %}
            <div class="inputbox">
                <input type="email" name="email" required="required">
                <span>Email</span>
            </div>
            <div class="inputbox">
                <input type="password" name="password" required="required" id="password">
                <span>Password</span>
                <i class="fas fa-eye eye-icon" id="togglePassword"></i>
            </div>
            <div class="inputbox">
                <input type="submit" value="Login">
            </div>
            <a href="{% url 'forgot_password' %}" class="text-center">Forgot Password?</a>
        </form>
    </div>

    <script>
        // JavaScript for toggling password visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordField = document.getElementById('password');

        togglePassword.addEventListener('click', function (e) {
            // Toggle the password field type between 'password' and 'text'
            const type = passwordField.type === 'password' ? 'text' : 'password';
            passwordField.type = type;
            // Toggle the eye icon to show/hide password
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
