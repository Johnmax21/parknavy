<!DOCTYPE html>
<html lang="en">
<head>
    <title>Verify OTP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-100">
    <form method="POST" class="bg-white p-6 rounded-lg shadow-md w-96">
        {% csrf_token %}
        <h2 class="text-xl font-semibold mb-4 text-center">Verify OTP</h2>
        <input type="text" name="otp" placeholder="Enter OTP" required class="w-full p-2 border rounded-md mb-4">
        <button type="submit" class="w-full bg-green-500 text-white py-2 rounded-md">Verify</button>
    </form>
</body>
</html>
