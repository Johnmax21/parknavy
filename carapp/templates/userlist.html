{% extends 'admin_home.html' %}
{% block content %}

<style>
    .styled-table {
        width: 900px; /* Set table width to 1000px */
        margin: 0px auto; /* Center the table horizontally and add margin */
        border-collapse: collapse;
        font-size: 14px;
    }
    
    .styled-table th, .styled-table td {
        padding: 10px 15px;
        border: 1px solid #ddd;
    }
    
    .styled-table th {
        background-color: #f4f4f4;
        color: #333;
    }
    
    .styled-table tbody tr:nth-child(even) {
        background-color: #f9f9f9;
    }
    
    .styled-table tbody tr:hover {
        background-color: #f1f1f1;
    }
    
    .styled-table img {
        border-radius: 5px;
    }
    
    .styled-table a {
        color: #ff4d4d;
        text-decoration: none;
        font-weight: bold;
    }
    
    .styled-table a:hover {
        text-decoration: underline;
    }
</style>


<table class="styled-table">
    <thead>
        <tr>
            <th>Image</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Age</th>
            <th>Email</th>
            <th>Address</th>
            <th>Phone</th>
            <th>Delete</th>
            <th>Update Status</th>
        </tr>
    </thead>
    <tbody>
        {% for i in user %}
        <tr>
            <td><img src="/media/{{ i.image }}" height="50" width="50" alt="User Image"></td>
            <td>{{ i.first_name }}</td>
            <td>{{ i.last_name }}</td>
            <td>{{ i.age }}</td>
            <td>{{ i.email }}</td>
            <td>{{ i.address }}</td>
            <td>{{ i.phone }}</td>
            <td><a href="/delete_user/{{ i.id }}">Delete</a></td>
            <td><form method ="post" action ="{%url 'update_status' %}">
                {% csrf_token %}
                <input type ="hidden" name ="email" value ="{{i.email}}">
                <select name="status"> 
                    <option value="applied"{% if i.status == 'applied' %}selected{% endif %}>Applied</option>
                    <option value="approved"{% if i.status == 'approved' %}selected{% endif %}>Approved</option>
                    <option value="rejected"{% if i.status == 'rejected' %}selected{% endif %}>Rejected</option>
                </select>
                <button type="submit">Update Status</button>
                </form>
            </td>


                </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
