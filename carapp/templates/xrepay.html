{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extra Payments</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }
        .container {
            width: 60%;
            margin: auto;
            padding-top: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            text-align: left;
        }
        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:disabled {
            background: gray;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Extra Payments</h2>
        {% for item in user %}
        <div class="card">
            <p><strong>Email:</strong> {{ item.email }}</p>
            <p><strong>Amount:</strong> ₹{{ item.Tamount }}</p>
            <p><strong>Status:</strong> <span id="status-{{ item.id }}">{{ item.status }}</span></p>
            {% if item.status != "paid" %}
    <button onclick="payNow({{ item.id }}, {{ item.Tamount }})">Pay Now</button>
{% else %}
    <button disabled>Paid</button>
{% endif %}

        </div>
        {% empty %}
        <p>No pending payments.</p>
        {% endfor %}
    </div>


       <script>
    function payNow(paymentId, amount) {
        var options = {
            "key": "{{ RAZOR_KEY_ID }}", // Ensure this is correctly passed
            "amount": amount * 100, // Amount in paisa
            "currency": "INR",
            "name": "Your Company",
            "description": "Extra Payment",
            "image": "https://yourwebsite.com/logo.png", // Optional company logo
            "handler": function (response) {
                console.log("Payment Successful:", response);

                fetch("/update-payment-status/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": "{{ csrf_token }}"
                    },
                    body: JSON.stringify({
                        "payment_id": paymentId,
                        "razorpay_payment_id": response.razorpay_payment_id
                    })
                }).then(res => res.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById(`status-${paymentId}`).innerText = "paid";
                        alert("Payment Successful!");
                        location.reload();
                    } else {
                        alert("Payment Failed!");
                    }
                }).catch(err => console.error("Error updating status:", err));
            },
            "prefill": {
                "email": "{{ request.session.email }}", // Prefill email if available
            },
            "theme": {
                "color": "#3399cc"
            }
        };

        try {
            var rzp1 = new Razorpay(options);
            rzp1.open();
        } catch (error) {
            console.error("Razorpay Error:", error);
            alert("Razorpay Payment could not be initialized. Check console for details.");
        }
    }
</script>


</body>
</html>
