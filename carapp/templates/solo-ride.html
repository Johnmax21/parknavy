<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Solo Ride - Book Private Ride</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
* { box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #f7fafc;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 720px;
  margin: auto;
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 25px rgba(0,0,0,0.08);
  padding: 24px;
}

h1 {
  text-align: center;
  color: #2b6cb0;
  margin-bottom: 24px;
}

.form-group { margin-bottom: 20px; }

label {
  font-weight: 600;
  display: block;
  margin-bottom: 6px;
}

input[type="text"] {
  width: 100%;
  padding: 10px;
  border: 1px solid #cbd5e0;
  border-radius: 6px;
  font-size: 15px;
}

#map {
  height: 420px;
  width: 100%;
  margin: 20px 0;
  border-radius: 10px;
  border: 1px solid #e2e8f0;
}

#fare-result {
  background: #ebf8ff;
  border: 1px solid #bee3f8;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 16px;
  display: none;
}

button {
  background: #3182ce;
  color: white;
  border: none;
  padding: 14px;
  font-size: 1rem;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  width: 100%;
}

button:disabled {
  background: #a0aec0;
  cursor: not-allowed;
}
</style>
</head>
<body>

<div class="container">
  <h1>Solo Ride Booking</h1>

  <div class="form-group">
    <label>Pickup Location</label>
    <input type="text" id="from" readonly>
  </div>

  <div class="form-group">
    <label>Destination</label>
    <input type="text" id="to" placeholder="Enter destination in Thrissur">
  </div>

  <div id="map"></div>

  <div id="fare-result">
    <strong>Fare: ₹<span id="fare-amount"></span></strong><br>
    <small id="fare-detail"></small>
  </div>

  <button id="bookBtn" disabled onclick="bookRide()">Book Solo Ride</button>
</div>

<script>
let map, fromMarker, toMarker, routeLine;
let fromLatLng = null;
let toLatLng = null;
const bookBtn = document.getElementById("bookBtn");

function initMap(lat, lng) {
  map = L.map('map').setView([lat, lng], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
  }).addTo(map);

  requestAnimationFrame(() => map.invalidateSize());

  new ResizeObserver(() => map.invalidateSize())
    .observe(document.getElementById("map"));
}

function updateButton() {
  bookBtn.disabled = !(fromLatLng && toLatLng);
}

async function calculateRouteAndFare() {
  if (!fromLatLng || !toLatLng) return;

  const url = `https://router.project-osrm.org/route/v1/driving/` +
              `${fromLatLng.lng},${fromLatLng.lat};` +
              `${toLatLng.lng},${toLatLng.lat}?overview=full&geometries=geojson`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    if (!data.routes.length) throw new Error("No route");

    const route = data.routes[0];
    const distanceKm = route.distance / 1000;
    const durationMin = route.duration / 60;

    if (routeLine) map.removeLayer(routeLine);

    routeLine = L.geoJSON(route.geometry, {
      style: { color: '#3182ce', weight: 5 }
    }).addTo(map);

    map.fitBounds(routeLine.getBounds(), { padding: [40, 40] });

    let fare = 30;
    if (distanceKm > 1.5) {
      fare += Math.ceil(distanceKm - 1.5) * 19;
    }

    document.getElementById("fare-amount").textContent = fare;
    document.getElementById("fare-detail").textContent =
      `${distanceKm.toFixed(2)} km • ${durationMin.toFixed(0)} min • ₹30 base + ₹19/km`;

    document.getElementById("fare-result").style.display = "block";

    updateButton();

  } catch (err) {
    alert("Route calculation failed.");
  }
}

function getCurrentLocation() {
  navigator.geolocation.getCurrentPosition(async pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    fromLatLng = L.latLng(lat, lon);

    initMap(lat, lon);

    fromMarker = L.marker([lat, lon])
      .addTo(map)
      .bindPopup("Pickup Location")
      .openPopup();

    document.getElementById("from").value = "Your Current Location";
    updateButton();
  },
  err => alert("Location access denied"));
}

document.getElementById("to").addEventListener("change", async function() {
  const val = this.value.trim();
  if (!val) return;

  const query = `${val}, Thrissur, Kerala, India`;

  const res = await fetch(
    `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`
  );
  const data = await res.json();

  if (!data.length) {
    alert("Location not found.");
    return;
  }

  const lat = data[0].lat;
  const lon = data[0].lon;

  toLatLng = L.latLng(lat, lon);

  if (toMarker) map.removeLayer(toMarker);

  toMarker = L.marker([lat, lon])
    .addTo(map)
    .bindPopup("Destination");

  calculateRouteAndFare();
});

function bookRide() {
  const fare = document.getElementById("fare-amount").textContent;
  alert("Ride Booked!\nEstimated Fare: ₹" + fare);
}

getCurrentLocation();
</script>

</body>
</html>
