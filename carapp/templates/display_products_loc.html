<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Nearby Shops</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-5">
        <button onclick="history.back()" class="bg-gray-300 text-gray-800 py-2 px-4 rounded hover:bg-gray-400">Back</button>
        <div class="bg-white shadow rounded-lg p-5 mb-5">
            <h1 class="text-2xl font-bold text-gray-800 text-center mb-5">Find Nearby locations</h1>
            <div class="flex justify-center items-center gap-3 mb-5">
                <input type="text" id="location" value="{{ pick_up }}" class="border border-gray-300 p-2 rounded-md w-64" placeholder="Enter your location">
                <button onclick="findNearbyShops()" class="bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600">Find parking area</button>
                <button onclick="getCurrentLocation()" class="bg-green-500 text-white py-2 px-4 rounded hover:bg-green-600">Use My Location</button>
            </div>
            </div>
            <div id="loading" class="hidden text-center text-gray-600 italic">Searching for parking area nearby...</div>
        </div>

        <div id="shops-list" class="grid gap-5 grid-cols-1 md:grid-cols-2 lg:grid-cols-3"></div>

        <div id="products-container" class="hidden bg-white shadow rounded-lg p-5 mt-5">
            <div class="flex justify-between items-center mb-5">
                <h2 id="selected-shop-name" class="text-xl font-bold text-gray-800"></h2>
                
            </div>
            <div id="products-grid" class="grid gap-5 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"></div>
        </div>
    </div>




    <script>


        function getCurrentLocation() {
            if (navigator.geolocation) {
                document.getElementById("loading").classList.remove("hidden");
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${position.coords.latitude}&lon=${position.coords.longitude}&zoom=18&addressdetails=1`;
                        fetch(url)
                            .then(response => response.json())
                            .then(data => {
                                let location = data.address.village || 
                                              data.address.suburb || 
                                              data.address.neighbourhood ||
                                              data.address.town ||
                                              data.address.city;
                                if (data.address.state_district) {
                                    location += `, ${data.address.state_district}`;
                                } else if (data.address.district) {
                                    location += `, ${data.address.district}`;
                                }
                                document.getElementById("location").value = location;
                                findNearbyShops();
                            })
                            .catch(error => {
                                alert("Error getting location name: " + error);
                                document.getElementById("loading").classList.add("hidden");
                            });
                    },
                    function(error) {
                        alert("Error getting location: " + error.message);
                        document.getElementById("loading").classList.add("hidden");
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    }
                );
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }


        function findNearbyShops() {
            const location = document.getElementById("location").value;
            if (!location) {
                alert("Please enter a location");
                return;
            }

            document.getElementById("loading").classList.remove("hidden");
            document.getElementById("products-container").classList.add("hidden");

            $.ajax({
                url: "/get_nearby_shops/",
                method: "POST",
                data: {
                    location: location,
                    csrfmiddlewaretoken: "{{ csrf_token }}"
                },
                success: function(response) {
                    displayShops(response.shops);
                    document.getElementById("loading").classList.add("hidden");
                },
                error: function(error) {
                    alert("Error finding shops: " + error.responseText);
                    document.getElementById("loading").classList.add("hidden");
                }
            });
        }

        function displayShops(shops) {
            const shopsContainer = document.getElementById("shops-list");
            shopsContainer.innerHTML = "";

            if (shops.length === 0) {
                shopsContainer.innerHTML = "<p class='text-gray-600'>No Slot found in this area.</p>";
                return;
            }

            shops.forEach(shop => {
                shopsContainer.innerHTML += `
                    <div class="bg-white shadow rounded-lg p-4">
                        <h3 class="text-lg font-bold">${shop.shop_name}</h3>
                        <p>Location: ${shop.shop_location}</p>
                        <p>Contact: ${shop.shop_phone}</p>
                       <p>Status: ${shop.status ? "Active" : "active"}</p>
                        
                       

                    ${shop.recurr !== 0 ? 
                `<p><a href="/add_cart/${shop.shop_id}" class="px-4 py-2 bg-blue-600 text-black text-sm font-medium rounded-md hover:bg-blue-700">
                    Book
                </a></p>` :
                '<p>No slots available</p>'}
                    </div>
                `;
            });
        }

        function showProducts(shopId, shopName) {
            document.getElementById("loading").classList.remove("hidden");

            $.ajax({
                url: `/get_shop_products/${shopId}/`,
                method: "GET",
                success: function(response) {
                    displayProducts(response.products, shopName);
                    document.getElementById("loading").classList.add("hidden");
                },
                error: function(error) {
                    alert("Error fetching products: " + error.responseText);
                    document.getElementById("loading").classList.add("hidden");
                }
            });
        }


        function displayProducts(products, shopName) {
            document.getElementById("selected-shop-name").textContent = `Products available at ${shopName}`;
            document.getElementById("products-container").classList.remove("hidden");

            const productsGrid = document.getElementById("products-grid");
            productsGrid.innerHTML = "";

            if (products.length === 0) {
                productsGrid.innerHTML = "<p class='text-gray-600'>No products available in this shop.</p>";
                return;
            }

            products.forEach(product => {
                productsGrid.innerHTML += `
                    <div class="bg-white shadow rounded-lg p-4">
                        ${product.image_url ? 
                            `<img src="${product.image_url}" class="w-32 h-32 object-cover mx-auto mb-3" alt="${product.name}">` : 
                            '<p class="text-gray-500">No image available</p>'
                        }
                        <h3 class="text-lg font-bold">${product.name}</h3>
                        <p>${product.details}</p>
                        <p>Brand: ${product.brand}</p>
                        <p>Price: ₹${product.price}</p>
                        <p>Quantity Available: ${product.quantity}</p>
                        ${product.rating ? `<p>Rating: ${product.rating}/5</p>` : ''}
                        <a href="/add-to-cart/${product.id}/" class="mt-3 inline-block bg-green-500 text-white py-2 px-4 rounded hover:bg-green-600">Add to Cart</a>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
