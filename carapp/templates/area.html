{% extends 'admin_home.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Parking Space</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
            margin-bottom: 50px;
        }
        .form-container h2 {
            text-align: center;
            margin-bottom: 30px;
            font-family: 'Arial', sans-serif;
            font-weight: 600;
            color: #343a40;
        }
        .form-group label {
            font-weight: bold;
            color: #495057;
        }
        .btn-custom {
            background-color: #28a745;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }
        .btn-custom:hover {
            background-color: #218838;
        }
        .form-control, .form-control-file {
            border-radius: 0.25rem;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
            padding: 12px;
        }
        .form-control:focus {
            box-shadow: 0 0 8px rgba(40, 167, 69, 0.5);
        }
        .btn-block {
            padding: 12px 20px;
        }
        /* Media Query for Mobile Devices */
        @media (max-width: 767px) {
            .form-container {
                padding: 20px;
                margin-top: 30px;
            }
            h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-sm-10">
                <div class="form-container">
                    <h2>Add New Parking Space</h2>
                    <form method="POST" enctype="multipart/form-data" action="/area/">
                        {% csrf_token %}
                        
                        {% comment %} <div class="form-group">
                            <label for="area_id">Area ID:</label>
                            <input type="number" class="form-control" name="area_id" id="area_id" placeholder="Enter Area ID" required>
                        </div> {% endcomment %}

                        <div class="form-group">
                            <label for="space_name">Area Name:</label>
                            <input type="text" class="form-control" name="space_name" id="space_name" placeholder="Enter Area Name" required>
                        </div>

                        <div class="form-group">
                            <label for="size">Size (sq ft):</label>
                            <input type="number" class="form-control" name="size" id="size" placeholder="Enter Size in sq ft" required>
                        </div>

                        <div class="form-group">Size
                            <label for="total_slot">Total Slot:</label>
                            <input type="number" class="form-control" name="total_slot" id="total_slot" placeholder="Enter the total number of slots" required>
                        </div>


                        

                        <div class="form-group">
                            <label for="availability">Availability:</label>
                            <select class="form-control" name="availability" id="availability" required>
                                <option value="" disabled selected>Select Availability</option>
                                <option value="Available">Available</option>
                                <option value="Not Available">Not Available</option>
                            </select>
                            <!-- Text to display the availability status -->
                            <small id="availability-status" class="form-text text-muted" style="display: none;">
                                Selected Availability: <span id="availability-text">Not Selected</span>
                            </small>
                        </div>
                        

                        <div class="form-group">
                            <label for="price">Price (per hour):</label>
                            <input type="number" class="form-control" name="price" id="price" placeholder="Enter Price" required>
                        </div>

                        <div class="form-group">
                            <label for="price">recurringquantity:</label>
                            <input type="number" class="form-control" name="recurring" id="price" placeholder="Enter recurringquantity" required>
                        </div>

                        <div class="form-group">
                            <label for="price">slot_quantity:</label>
                            <input type="number" class="form-control" name="slot_quantity" id="price" placeholder="Enter slot_quantity" required>
                        </div>

                        <div class="form-group">
                            <label for="location">District:</label>
                            <input type="text" class="form-control" name="location" id="location" placeholder="Enter District" required>
                        </div>

                        <div class="form-group">
                            <label for="location">City:</label>
                            <input type="text" class="form-control" name="place" id="place" placeholder="Enter City" required>
                        </div>

                        <div class="form-group">
                            <label for="space_type">Space Type:</label>
                            <input type="text" class="form-control" name="space_type" id="space_type" placeholder="Enter Space Type" required>
                        </div>

                        <div class="form-group">
                            <label for="feature">Features:</label>
                            <input type="text" class="form-control" name="feature" id="feature" placeholder="Enter Features" required>
                        </div>

                        <div class="form-group">
                            <label for="operating_hours">Operating Hours:</label>
                            <input type="text" class="form-control" name="operating_hours" id="operating_hours" placeholder="Enter Operating Hours" required>
                        </div>

                        

                        <div class="form-group">
                            <label for="contact_information">Contact Information:</label>
                            <input type="tel" class="form-control" name="contact_information" id="contact_information" placeholder="Enter Contact Information" required>
                        </div>

                        <div class="form-group">
                            <label for="image">Upload Image:</label>
                            <input type="file" class="form-control-file" name="image" id="image">
                        </div>


                        <div class="form-group">
                            <label for="price">RENT PER DAY:</label>
                            <input type="number" class="form-control" name="rentperday" id="price" placeholder="Enter rate" required>
                        </div>

                        <button type="submit" class="btn btn-custom btn-block">Add Parking Space</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        document.getElementById('availability').addEventListener('change', function() {
            var availabilityText = this.value; // Get selected value
    
            // Get the availability status element
            var statusElement = document.getElementById('availability-status');
            var textElement = document.getElementById('availability-text');
            
            // If an option is selected, update and show the status message
            if (availabilityText) {
                statusElement.style.display = 'block'; // Show the status text
                textElement.textContent = availabilityText; // Update the status text
            } else {
                statusElement.style.display = 'none'; // Hide the status text if no selection
            }
        });
    </script>
</body>
</html>
{% endblock %}
